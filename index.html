<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Speech Studio — L1 Fluency Program</title>
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  :root{
    --bg:#ffffff;--bg2:#f7f7f5;--bg3:#f0efe9;
    --text:#1a1a18;--text2:#6b6b67;--text3:#9b9b96;
    --border:rgba(0,0,0,0.1);--border2:rgba(0,0,0,0.2);
    --blue:#378ADD;--blue-bg:#E6F1FB;--blue-tc:#0C447C;
    --gold:#B08D57;
    --radius:8px;--radius-lg:14px;
    --shadow:0 1px 3px rgba(0,0,0,0.06),0 8px 24px rgba(0,0,0,0.04);
  }
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg3);color:var(--text);min-height:100vh}
  .page{max-width:760px;margin:0 auto;padding:2.5rem 1.25rem 4rem}
  header{text-align:center;margin-bottom:2rem}
  .kicker{font-size:11px;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:var(--gold);margin-bottom:8px}
  h1{font-size:28px;font-weight:700;margin-bottom:8px}
  .sub{font-size:14px;color:var(--text2);max-width:480px;margin:0 auto}

  .panel{background:var(--bg);border-radius:var(--radius-lg);box-shadow:var(--shadow);padding:1.75rem;margin-bottom:1.5rem}
  .row{margin-bottom:1.25rem}
  .row:last-child{margin-bottom:0}
  label{display:block;font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:0.05em;color:var(--text3);margin-bottom:8px}
  select,input[type=text]{width:100%;padding:12px 14px;border-radius:var(--radius);border:0.5px solid var(--border2);background:var(--bg2);font-size:15px;font-family:inherit}

  .scenario-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:8px}
  .scenario-btn{padding:12px 14px;border-radius:var(--radius);border:0.5px solid var(--border2);background:var(--bg2);font-size:13px;text-align:left;cursor:pointer;font-family:inherit;color:var(--text)}
  .scenario-btn.active{background:var(--blue);border-color:var(--blue);color:#fff}

  .cta{width:100%;padding:14px;border-radius:var(--radius);border:none;background:var(--text);color:#fff;font-size:15px;font-weight:600;cursor:pointer;margin-top:1.5rem}
  .cta:disabled{opacity:0.4;cursor:not-allowed}

  .result{display:none}
  .result.show{display:block}
  .voice-tag{display:inline-block;font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px;background:var(--blue-bg);color:var(--blue-tc);margin-bottom:10px}
  .result h2{font-size:22px;font-weight:700;margin-bottom:6px}
  .result .intro{font-size:14px;color:var(--text2);line-height:1.6;margin-bottom:1.5rem;padding-bottom:1.25rem;border-bottom:0.5px solid var(--border)}
  .field{margin-bottom:1.1rem}
  .field-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.05em;color:var(--text3);margin-bottom:6px}
  .field-value{font-size:14.5px;line-height:1.65}
  .field-value.script{font-style:italic;background:var(--bg2);padding:12px 14px;border-radius:var(--radius);border-left:3px solid var(--blue)}
  .back-link{display:inline-block;margin-top:1.5rem;font-size:13px;color:var(--text2);cursor:pointer;text-decoration:underline}
  footer{text-align:center;font-size:11px;color:var(--text3);margin-top:2rem}
</style>
</head>
<body>
<div class="page">
  <header>
    <div class="kicker">The Speech Studio</div>
    <h1>L1 — Fluency Program</h1>
    <p class="sub">Pick the situation you're facing and your communication colour — get a tailored script, technique, and one thing to watch for.</p>
    <p class="sub" style="margin-top:10px"><a href="fluency-diagnostic.html" style="color:var(--blue);font-weight:600;text-decoration:underline">→ Take the Fluency Diagnostic (pace, idioms, grammar &amp; vocabulary)</a></p>
  </header>

  <div class="panel" id="input-panel">
    <div class="row">
      <label for="name">Your name (optional)</label>
      <input type="text" id="name" placeholder="e.g. Aditi">
    </div>
    <div class="row">
      <label for="colour">Your communication colour</label>
      <select id="colour">
        <option value="Red — driven">Red — driven</option>
        <option value="Yellow — influential">Yellow — influential</option>
        <option value="Green — steady">Green — steady</option>
        <option value="Blue — precise">Blue — precise</option>
      </select>
    </div>
    <div class="row">
      <label>What situation do you need help with?</label>
      <div class="scenario-grid" id="scenario-grid"></div>
    </div>
    <button class="cta" id="show-btn" disabled>Show my guidance</button>
  </div>

  <div class="panel result" id="result-panel"></div>

  <footer>© THE SPEECH STUDIO — L1 Fluency Program</footer>
</div>

<script src="l1-content-library.js"></script>
<script>
// ── SHARE EVERY ATTEMPT WITH COACH ──
// Replace the line below with your Apps Script URL from COACH-LOG-SETUP.md
// Use the SAME URL in every tool file — they all report to one shared sheet.
const COACH_SHEET_URL = 'https://script.google.com/macros/s/AKfycbzWsp4lK6F0vnyGyynP5GvdtL8LLVXgT2Pz4rRYhym6_yT9uu-SLIlAgZtQmaLkXBZSTw/exec';
function notifyCoach(data){
  try{
    const payload = new URLSearchParams({ timestamp: new Date().toISOString(), tool: 'L1-Scenarios', ...data });
    fetch(COACH_SHEET_URL, { method:'POST', mode:'no-cors', body: payload }).catch(()=>{});
  }catch(e){}
}

let selectedScenario = null;

function renderScenarioGrid(){
  const grid = document.getElementById('scenario-grid');
  grid.innerHTML = L1_SCENARIOS.map(s =>
    `<button type="button" class="scenario-btn" data-id="${s.id}">${s.title}</button>`
  ).join('');
  grid.querySelectorAll('.scenario-btn').forEach(btn=>{
    btn.onclick = ()=>{
      selectedScenario = btn.dataset.id;
      grid.querySelectorAll('.scenario-btn').forEach(b=>b.classList.remove('active'));
      btn.classList.add('active');
      document.getElementById('show-btn').disabled = false;
    };
  });
}

function showResult(){
  const colour = document.getElementById('colour').value;
  const name = document.getElementById('name').value.trim();
  const c = getL1Content(selectedScenario, colour);
  const greeting = name ? `${name}, here's` : "Here's";

  document.getElementById('input-panel').style.display = 'none';

  const panel = document.getElementById('result-panel');
  panel.innerHTML = `
    <div class="voice-tag">VOICE-${c.voice}</div>
    <h2>${greeting} your guidance: ${c.title}</h2>
    <p class="intro">${c.intro}</p>
    <div class="field"><div class="field-label">Opening script</div><div class="field-value script">"${c.script}"</div></div>
    <div class="field"><div class="field-label">Technique</div><div class="field-value">${c.technique}</div></div>
    <div class="field"><div class="field-label">Watch for</div><div class="field-value">${c.watchFor}</div></div>
    <div class="field"><div class="field-label">Confidence-building move</div><div class="field-value">${c.confidenceMove}</div></div>
    <span class="back-link" id="back-link">← Try another situation</span>
  `;
  panel.classList.add('show');
  notifyCoach({ name: name || 'Anonymous', colour, scenario: c.title });
  document.getElementById('back-link').onclick = ()=>{
    panel.classList.remove('show');
    document.getElementById('input-panel').style.display = 'block';
  };
}

document.getElementById('show-btn').addEventListener('click', showResult);
renderScenarioGrid();
</script>
</body>
</html>
